name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.2.0). Leave blank to auto-bump the patch.'
        required: false

permissions:
  contents: write

# Serialize releases so two quick pushes can't compute/create the same version.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-installer:
    runs-on: windows-latest
    # Allow skipping a release for docs-only commits with [skip release] in the message.
    if: "!contains(github.event.head_commit.message, '[skip release]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # need full history + tags to compute the next version

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          $override = '${{ github.event.inputs.version }}'
          if ($override) {
              $v = $override.TrimStart('v')
          }
          else {
              git fetch --tags --force --quiet 2>$null
              $tags = @(git tag --list 'v*' | Where-Object { $_ -match '^v\d+\.\d+\.\d+$' })
              if ($tags.Count -eq 0) {
                  $v = '1.0.0'
              }
              else {
                  $latest = $tags | ForEach-Object { [version]$_.Substring(1) } | Sort-Object | Select-Object -Last 1
                  $v = '{0}.{1}.{2}' -f $latest.Major, $latest.Minor, ($latest.Build + 1)
              }
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$v"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Releasing version $v (tag v$v)"

      - name: Publish executable
        shell: pwsh
        run: .\build\publish.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=${{ steps.ver.outputs.version }}" installer\LetsSSL4Windows.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LetsSSL4Windows-Setup
          path: build/installer-output/*.exe

      - name: Package PowerShell edition
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.version }}'
          New-Item -ItemType Directory -Force -Path build/ps-output | Out-Null
          Copy-Item powershell/LetsSSL4Windows.ps1 "build/ps-output/LetsSSL4Windows-$v.ps1"
          Compress-Archive -Path powershell/* -DestinationPath "build/ps-output/LetsSSL4Windows-PowerShell-$v.zip" -Force

      - name: Upload PowerShell artifact
        uses: actions/upload-artifact@v4
        with:
          name: LetsSSL4Windows-PowerShell
          path: build/ps-output/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            build/installer-output/*.exe
            build/publish/LetsSSL4Windows-*.exe
            build/ps-output/LetsSSL4Windows-*.ps1
            build/ps-output/LetsSSL4Windows-PowerShell-*.zip
