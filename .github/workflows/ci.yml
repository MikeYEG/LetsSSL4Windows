name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    # WPF (LetsSSL.App) targets net8.0-windows, so build on Windows.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore LetsSSL.sln

      - name: Build
        run: dotnet build LetsSSL.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/LetsSSL.Core.Tests/LetsSSL.Core.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: PowerShell tests (Pester)
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          # Pin an exact Pester version for reproducible runs. -SkipPublisherCheck is
          # required because the runner ships a preinstalled Pester 3.4 signed with a
          # different certificate, which would otherwise block the 5.x install.
          Install-Module Pester -RequiredVersion 5.6.1 -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module Pester -RequiredVersion 5.6.1
          Invoke-Pester -Path powershell/tests -CI
