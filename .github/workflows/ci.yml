name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    # WPF (LetsSSL.App) targets net8.0-windows, so build on Windows.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore LetsSSL.sln

      - name: Build
        run: dotnet build LetsSSL.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/LetsSSL.Core.Tests/LetsSSL.Core.Tests.csproj --configuration Release --no-build --verbosity normal
